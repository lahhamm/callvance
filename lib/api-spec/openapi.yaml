openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AI Voice Agent API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: agent
    description: Agent configuration
  - name: contacts
    description: Contact management
  - name: calls
    description: Call management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /agent-config:
    get:
      operationId: getAgentConfig
      tags: [agent]
      summary: Get agent configuration
      responses:
        "200":
          description: Agent configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfig"
    patch:
      operationId: updateAgentConfig
      tags: [agent]
      summary: Update agent configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentConfigUpdate"
      responses:
        "200":
          description: Updated agent configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfig"

  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List all contacts
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"
    post:
      operationId: createContact
      tags: [contacts]
      summary: Add a new contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Created contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /contacts/{id}:
    get:
      operationId: getContact
      tags: [contacts]
      summary: Get a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "404":
          description: Not found
    patch:
      operationId: updateContact
      tags: [contacts]
      summary: Update a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactUpdate"
      responses:
        "200":
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
    delete:
      operationId: deleteContact
      tags: [contacts]
      summary: Delete a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /calls:
    get:
      operationId: listCalls
      tags: [calls]
      summary: List all calls
      responses:
        "200":
          description: List of calls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Call"

  /calls/initiate:
    post:
      operationId: initiateCall
      tags: [calls]
      summary: Initiate a call to a contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CallInitiate"
      responses:
        "201":
          description: Call initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"

  /calls/webhook:
    post:
      operationId: callWebhook
      tags: [calls]
      summary: BlandAI webhook for call events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
      responses:
        "200":
          description: OK

  /calls/{id}:
    get:
      operationId: getCall
      tags: [calls]
      summary: Get call details with transcript
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Call details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"
        "404":
          description: Not found

  /calls/stats/summary:
    get:
      operationId: getCallStats
      tags: [calls]
      summary: Get call statistics summary
      responses:
        "200":
          description: Call statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AgentConfig:
      type: object
      properties:
        id:
          type: integer
        agentName:
          type: string
        voice:
          type: string
        prompt:
          type: string
        firstMessage:
          type: string
        maxDuration:
          type: integer
        updatedAt:
          type: string
      required:
        - id
        - agentName
        - voice
        - prompt
        - firstMessage
        - maxDuration
        - updatedAt

    AgentConfigUpdate:
      type: object
      properties:
        agentName:
          type: string
        voice:
          type: string
        prompt:
          type: string
        firstMessage:
          type: string
        maxDuration:
          type: integer

    Contact:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: ["string", "null"]
        company:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        status:
          type: string
        createdAt:
          type: string
        lastCalledAt:
          type: ["string", "null"]
      required:
        - id
        - name
        - phone
        - status
        - createdAt

    ContactInput:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        company:
          type: string
        notes:
          type: string
      required:
        - name
        - phone

    ContactUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        company:
          type: string
        notes:
          type: string
        status:
          type: string

    Call:
      type: object
      properties:
        id:
          type: integer
        contactId:
          type: ["integer", "null"]
        contactName:
          type: ["string", "null"]
        contactPhone:
          type: string
        blandCallId:
          type: ["string", "null"]
        status:
          type: string
        durationSeconds:
          type: ["integer", "null"]
        transcript:
          type: ["string", "null"]
        summary:
          type: ["string", "null"]
        outcome:
          type: ["string", "null"]
        startedAt:
          type: ["string", "null"]
        endedAt:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - contactPhone
        - status
        - createdAt

    CallInitiate:
      type: object
      properties:
        contactId:
          type: integer
      required:
        - contactId

    WebhookPayload:
      type: object
      properties:
        call_id:
          type: string
        status:
          type: string
        transcript:
          type: string
        summary:
          type: string
        duration:
          type: number

    CallStats:
      type: object
      properties:
        total:
          type: integer
        completed:
          type: integer
        failed:
          type: integer
        inProgress:
          type: integer
        avgDurationSeconds:
          type: ["number", "null"]
        totalContacts:
          type: integer
      required:
        - total
        - completed
        - failed
        - inProgress
        - totalContacts
